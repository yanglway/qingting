<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>财神2D</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: "Microsoft YaHei", sans-serif;
        background: radial-gradient(circle at top, #2b2b2b, #0f0f0f);
        min-height: 100vh;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    header {
        margin-top: 40px;
        text-align: center;
    }

    header h1 {
        font-size: 3.5em;
        color: #ffd700;
        text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
    }

    header p {
        color: #ccc;
        margin-top: 10px;
        font-size: 1.1em;
    }

    /* 开奖区 */
    .lottery-box {
        margin-top: 50px;
        display: flex;
        gap: 60px;
    }

    .ball {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        font-size: 5em;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 40px rgba(0,0,0,.5);
        transition: all .5s ease;
    }

    .ball.red {
        background: radial-gradient(circle at 30% 30%, #ff4d4d, #b30000);
    }

    .ball.blue {
        background: radial-gradient(circle at 30% 30%, #4da6ff, #003366);
    }

    .label {
        text-align: center;
        margin-top: 15px;
        font-size: 1.2em;
        color: #aaa;
    }

    /* 期号 */
    .period {
        margin-top: 40px;
        font-size: 1.4em;
        color: #ffd700;
    }

    /* 底部提示 */
    footer {
        margin-top: auto;
        padding: 20px;
        color: #666;
        font-size: 0.9em;
    }

    /* 展示动画 */
    .show {
        animation: pop 0.6s ease;
    }

    @keyframes pop {
        0% { transform: scale(0.5); opacity: 0; }
        60% { transform: scale(1.2); }
        100% { transform: scale(1); opacity: 1; }
    }
</style>
</head>

<body>

<header>
    <h1>🧧 财神2D 🧧</h1>
    <p>公平公正 · 官方开奖结果展示</p>
</header>

<!-- 期号 -->
<div class="period" id="period">期号：20260121001</div>

<!-- 开奖球 -->
<div class="lottery-box">
    <div>
        <div class="ball red" id="num1">?</div>
        <div class="label">第一位</div>
    </div>
    <div>
        <div class="ball blue" id="num2">?</div>
        <div class="label">第二位</div>
    </div>
</div>

<footer>
    本页面仅用于开奖结果展示，数据来源官方
</footer>

<script>
    /* ==========================
       ✅ 后台自定义开奖结果
       修改这里即可
    ========================== */
    function setResult(n1, n2) {
        document.getElementById("num1").innerText = n1;
        document.getElementById("num2").innerText = n2;

        document.getElementById("num1").classList.add("show");
        document.getElementById("num2").classList.add("show");
    }

    /* 示例：设置开奖结果为 3 和 7 */
    setResult(9, 7);

    /* 自动生成期号（年月日+序号） */
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, "0");
    const d = String(now.getDate()).padStart(2, "0");
    document.getElementById("period").innerText =
        `期号：${y}${m}${d}001`;
</script>

</body>
</html>
