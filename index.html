<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>财神2D 3D</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<meta name="format-detection" content="telephone=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<style>
/* ===== 样式完全没变 ===== */
body { margin: 0; font-family: "Microsoft YaHei", sans-serif; background: radial-gradient(circle at top, #2a2a2a, #0d0d0d); color: #fff; min-height: 100vh; }
.container { max-width: 900px; margin: auto; padding: 30px 20px; padding-bottom: 80px; }
header { text-align: center; }
header h1 { font-size: 3.5em; color: #ffd700; }
.datetime { color: #aaa; margin-top: 10px; }
.notice { background: rgba(255,215,0,.08); border-left: 4px solid #ffd700; padding: 15px; margin: 20px 0; }
.lottery-box { display: flex; justify-content: center; gap: 80px; margin: 30px 0; }
.ball { width: 140px; height: 140px; border-radius: 50%; font-size: 5em; font-weight: bold; display: flex; align-items: center; justify-content: center; transform: scale(0); transition: transform .6s ease; }
.ball.show { transform: scale(1); }
.ball.red { background: radial-gradient(circle at 30% 30%, #ff4d4d, #b30000); }
.ball.blue { background: radial-gradient(circle at 30% 30%, #4da6ff, #003366); }
.ball.green { background: radial-gradient(circle at 30% 30%, #4dff88, #009933); }
.period { text-align: center; font-size: 1.4em; color: #ffd700; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; }
th, td { padding: 12px; text-align: center; border-bottom: 1px solid #222; }
th { color: #888; }
td.num { font-size: 1.4em; }
.game-switch { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
.game-btn { padding: 8px 20px; border: 2px solid #ffd700; background: transparent; color: #ffd700; border-radius: 20px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
.game-btn.active { background: #ffd700; color: #000; }
@media screen and (max-width: 768px) { header h1 { font-size: 2.5em; } .lottery-box { gap: 40px; } .ball { width: 100px; height: 100px; font-size: 3.5em; } .datetime { font-size: 1.6em; color: #ffd700; margin-top: 15px; font-weight: bold; text-align: center; } }
.new-period { color: #ff4444 !important; font-weight: bold; animation: pulse 1.5s infinite; }
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
.floating-live-btn { position: fixed; bottom: 20px; right: 20px; z-index: 9999; background: linear-gradient(135deg, #ff3333, #cc0000); color: white; padding: 12px 18px; border-radius: 50px; font-weight: bold; font-size: 1.1em; box-shadow: 0 4px 15px rgba(255, 0, 0, 0.4); display: flex; align-items: center; gap: 8px; transition: all 0.3s; animation: float 3s ease-in-out infinite; cursor: pointer; }
.floating-live-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(255, 0, 0, 0.6); }
@keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
.myanmar-time { color: #aaa; margin-top: 5px; font-size: 0.9em; }
.recommend-box { margin: 20px 0; text-align: center; }
.recommend-title { color: #ffd700; font-size: 1.2em; margin-bottom: 8px; }
.recommend-nums { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
.recommend-num { color: #ffd700; font-size: 1.1em; padding: 3px 8px; border: 1px solid #333; border-radius: 3px; }
.schedule-info { background: rgba(255, 215, 0, 0.1); border: 1px solid #ffd700; border-radius: 8px; padding: 10px; margin: 15px 0; text-align: center; color: #ffd700; font-size: 0.9em; display: none; }
.fullscreen-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; flex-direction: column; }
.fullscreen-header { background: #222; padding: 12px; text-align: right; border-bottom: 1px solid #444; }
.fullscreen-close { background: #ff4757; color: white; border: none; padding: 8px 20px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; }
.fullscreen-iframe { flex: 1; width: 100%; border: none; background: white; }
#dreamBookBtn { position: fixed; bottom: 20px; left: 20px; z-index: 9999; background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 12px 20px; border-radius: 50px; font-weight: bold; font-size: 1.1em; box-shadow: 0 4px 15px rgba(102,126,234,0.4); cursor: pointer; display: none; align-items: center; gap: 8px; font-family: system-ui, 'Segoe UI', sans-serif; transition: all 0.3s; }
#dreamBookBtn:hover { transform: scale(1.05); }
/* 小窗口相关样式保留但不使用 */
#youtubePopup { display: none; }
#closeYoutubeBtn { display: none; }
</style>
</head>
<body>

<div class="container">
    <header>
        <h1>🧧财神2D 3D🧧</h1>
        <div class="game-switch">
            <button class="game-btn active" onclick="switchGame('2d')">2D</button>
            <button class="game-btn" onclick="switchGame('3d')">3D</button>
        </div>
        <div class="myanmar-time" id="myanmarTime"></div>
    </header>

    <div class="notice" id="notice2d">📢 1赔80 缅甸时间每天晚上6:30封盘 7:00开奖</div>
    <div class="schedule-info" id="notice3d">⏰ 3D开奖：每周六 缅甸时间 22:00 1赔800</div>

    <div class="period" id="period"></div>

    <div class="lottery-box" id="box2d">
        <div class="ball red" id="b1"></div>
        <div class="ball blue" id="b2"></div>
    </div>
    <div class="lottery-box" id="box3d" style="display:none;">
        <div class="ball red" id="b3d1"></div>
        <div class="ball blue" id="b3d2"></div>
        <div class="ball green" id="b3d3"></div>
    </div>

    <div class="datetime" id="datetime"></div>

    <div class="recommend-box" id="recommendBox">
        <div class="recommend-title">今日推荐号码</div>
        <div class="recommend-nums" id="recommendNums"></div>
    </div>

    <table>
        <thead><tr><th>期号</th><th>时间</th><th>结果</th></tr></thead>
        <tbody id="history"></tbody>
    </table>
</div>

<div class="floating-live-btn" id="liveBtn">🔴 直播中</div>
<div id="dreamBookBtn">📖 3D 梦书</div>

<div id="dreamFullscreen" class="fullscreen-overlay">
    <div class="fullscreen-header"><button class="fullscreen-close" id="closeDreamBtn">✕ 关闭</button></div>
    <iframe class="fullscreen-iframe" id="dreamIframe" src="https://dream.4dnum.com/qzt/cn"></iframe>
</div>

<script>
/* ===== 缅甸时间 ===== */
function updateMyanmarTime() {
    const now = new Date();
    const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    const mt = new Date(utc + 3600000 * 6.5);
    const s = mt.toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
    document.getElementById('myanmarTime').textContent = '缅甸时间：' + s;
}
updateMyanmarTime();
setInterval(updateMyanmarTime, 1000);

/* ===== 推荐号 ===== */
(function(){
    const today = new Date().toISOString().split('T')[0].replace(/-/g,'');
    let seed = parseInt(today,10)||1;
    const nums=new Set();
    while(nums.size<10){
        seed=(seed*9301+49297)%233280;
        nums.add(String(seed%100).padStart(2,'0'));
    }
    document.getElementById('recommendNums').innerHTML=[...nums].map(n=>`<span class="recommend-num">${n}</span>`).join('');
})();

/* ===== 数据拉取 ===== */
const URL_2D="https://qingting.vercel.app/data/result.json";
const URL_3D="https://qingting.vercel.app/data/result3d.json";
let currentGame='2d';

function switchGame(g){
    currentGame=g;
    document.querySelectorAll('.game-btn').forEach(b=>{
        b.classList.remove('active');
        if(b.textContent.includes(g.toUpperCase())) b.classList.add('active');
    });
    document.getElementById('box2d').style.display=g==='2d'?'flex':'none';
    document.getElementById('box3d').style.display=g==='3d'?'flex':'none';
    document.getElementById('notice2d').style.display=g==='2d'?'block':'none';
    document.getElementById('notice3d').style.display=g==='3d'?'block':'none';
    document.getElementById('recommendBox').style.display=g==='2d'?'block':'none';
    document.getElementById('liveBtn').style.display=g==='2d'?'flex':'none';
    document.getElementById('history').innerHTML='';
    fetchData();
}

function fetchData(){
    const url=currentGame==='3d'?URL_3D:URL_2D;
    fetch(url+"?t="+Date.now())
    .then(r=>r.json())
    .then(data=>{
        document.getElementById("period").innerText=`第${data.period}期`;
        if(currentGame==='2d'){
            document.getElementById("b1").innerText=data.num1;
            document.getElementById("b2").innerText=data.num2;
        }else{
            document.getElementById("b3d1").innerText=data.num1;
            document.getElementById("b3d2").innerText=data.num2;
            document.getElementById("b3d3").innerText=data.num3;
        }
        document.getElementById("datetime").innerText=currentGame==='3d'?`每周六 缅甸时间 22:00 (${data.time})`:`开奖时间：${data.time}`;
        const balls=currentGame==='2d'? [b1,b2] : [b3d1,b3d2,b3d3];
        balls.forEach(b=>b.classList.remove("show"));
        setTimeout(()=>balls.forEach(b=>b.classList.add("show")),100);
        const tb=document.getElementById("history"); tb.innerHTML='';
        (data.history||[]).forEach((r,i)=>{
            const n=i===0;
            const html=currentGame==='2d'?`${r.num1} ${r.num2}`:`${r.num1} ${r.num2} ${r.num3}`;
            tb.innerHTML+=`<tr${n?' class="new-period"':''}><td${n?' style="color:#ff4444;font-weight:bold;"':''}>第${r.period}期</td><td${n?' style="color:#ff4444;font-weight:bold;"':''}>${r.time}</td><td class="num"${n?' style="color:#ff4444;font-weight:bold;"':''}>${html}</td></tr>`;
        });
    });
}
fetchData();
setInterval(fetchData,3000);

/* ===== ✅ 直播：直接跳转到 YouTube 频道 ===== */
(function(){
    const liveBtn = document.getElementById('liveBtn');
    liveBtn.addEventListener('click', () => {
        window.open('https://www.youtube.com/channel/UCsMYHYAAr88KMo1qm8D71Nw', '_blank');
    });
})();

/* ===== 3D 梦书 ===== */
(function(){
    const dreamBtn=document.getElementById('dreamBookBtn');
    const dreamFull=document.getElementById('dreamFullscreen');
    const closeDream=document.getElementById('closeDreamBtn');
    function upd(){dreamBtn.style.display=(document.querySelector('.game-btn.active')?.innerText.includes('3D'))?'flex':'none';}
    dreamBtn.addEventListener('click',()=>{dreamFull.style.display='flex';document.body.style.overflow='hidden';});
    closeDream.addEventListener('click',()=>{dreamFull.style.display='none';document.body.style.overflow='';});
    setInterval(upd,200); upd();
})();
</script>

</body>
</html>
