<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>财神2D</title>
<meta http-equiv="refresh" content="5">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: "Microsoft YaHei", sans-serif;
    background: radial-gradient(circle at top, #2a2a2a, #0d0d0d);
    color: #fff;
    min-height: 100vh;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 30px 20px;
}

header {
    text-align: center;
    margin-bottom: 30px;
}

header h1 {
    font-size: 3.5em;
    color: #ffd700;
    text-shadow: 0 0 20px rgba(255,215,0,.6);
}

.date {
    color: #aaa;
    margin-top: 10px;
}

/* 开奖区 */
.lottery-box {
    display: flex;
    justify-content: center;
    gap: 80px;
    margin-bottom: 20px;
}

.ball {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    font-size: 5em;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: scale(0);
    transition: transform .6s ease;
}

.ball.show {
    transform: scale(1);
}

.ball.red {
    background: radial-gradient(circle at 30% 30%, #ff4d4d, #b30000);
}

.ball.blue {
    background: radial-gradient(circle at 30% 30%, #4da6ff, #003366);
}

.period {
    text-align: center;
    font-size: 1.4em;
    color: #ffd700;
    margin-bottom: 10px;
}

/* 直播按钮 */
.live-btn {
    display: block;
    width: fit-content;
    margin: 20px auto;
    background: #e94560;
    color: #fff;
    padding: 14px 40px;
    border-radius: 30px;
    text-decoration: none;
    font-size: 1.2em;
}

/* 历史记录 */
.history {
    margin-top: 40px;
}

.history h2 {
    border-bottom: 1px solid #333;
    padding-bottom: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

th, td {
    padding: 12px;
    text-align: center;
    border-bottom: 1px solid #222;
}

th {
    color: #888;
}

td.num {
    font-size: 1.4em;
    font-weight: bold;
}

footer {
    text-align: center;
    margin-top: 40px;
    color: #555;
}
</style>
</head>

<body>

<div class="container">
    <header>
        <h1>🧧 财神2D 🧧</h1>
        <div class="date" id="date"></div>
    </header>

    <!-- 期号 -->
    <div class="period" id="period"></div>

    <!-- 开奖球 -->
    <div class="lottery-box">
        <div class="ball red" id="b1"></div>
        <div class="ball blue" id="b2"></div>
    </div>

    <!-- 直播链接 -->
    <a href="https://你的直播间地址" target="_blank" class="live-btn">
        🔴 进入直播间
    </a>

    <!-- 历史记录 -->
    <div class="history">
        <h2>📋 开奖记录</h2>
        <table>
            <thead>
                <tr>
                    <th>期号</th>
                    <th>日期</th>
                    <th>结果</th>
                </tr>
            </thead>
            <tbody id="historyBody">
            </tbody>
        </table>
    </div>

    <footer>© 财神2D 全球开奖展示</footer>
</div>

<script>
/* ===============================
   ✅ 首次设置开奖结果
   只会在第一次生效
=============================== */
const firstResult = {
    num1: 4,
    num2: 7
};

const now = new Date();
const dateStr = now.toLocaleDateString("zh-CN");

// 日期
document.getElementById("date").innerText = dateStr;

// 期数
let period = Number(localStorage.getItem("period")) || 1;
document.getElementById("period").innerText = `第${period}期`;

// 是否已存在本期结果
let stored = JSON.parse(localStorage.getItem("currentResult"));

if (!stored) {
    stored = firstResult;
    localStorage.setItem("currentResult", JSON.stringify(firstResult));

    // 保存历史
    const history = JSON.parse(localStorage.getItem("history") || "[]");
    history.unshift({
        period,
        date: dateStr,
        nums: `${firstResult.num1} ${firstResult.num2}`
    });
    localStorage.setItem("history", JSON.stringify(history.slice(0, 30)));
    localStorage.setItem("period", period + 1);
}

// 显示球
const b1 = document.getElementById("b1");
const b2 = document.getElementById("b2");

b1.innerText = stored.num1;
b2.innerText = stored.num2;

setTimeout(() => {
    b1.classList.add("show");
    b2.classList.add("show");
}, 100);

// 渲染历史
const historyData = JSON.parse(localStorage.getItem("history") || "[]");
const tbody = document.getElementById("historyBody");

historyData.forEach(r => {
    tbody.innerHTML += `
        <tr>
            <td>第${r.period}期</td>
            <td>${r.date}</td>
            <td class="num">${r.nums}</td>
        </tr>
    `;
});
</script>

</body>
</html>
