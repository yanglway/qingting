<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>财神开奖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<style>
/* 原有样式完全保留 */
body {
    margin: 0;
    font-family: "Microsoft YaHei", sans-serif;
    background: radial-gradient(circle at top, #2a2a2a, #0d0d0d);
    color: #fff;
    min-height: 100vh;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 30px 20px;
    padding-bottom: 80px;
}

header {
    text-align: center;
}

header h1 {
    font-size: 3.5em;
    color: #ffd700;
}

.datetime {
    color: #aaa;
    margin-top: 10px;
}

.notice {
    background: rgba(255,215,0,.08);
    border-left: 4px solid #ffd700;
    padding: 15px;
    margin: 20px 0;
}

.lottery-box {
    display: flex;
    justify-content: center;
    gap: 80px;
    margin: 30px 0;
}

.ball {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    font-size: 5em;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: scale(0);
    transition: transform .6s ease;
}

.ball.show {
    transform: scale(1);
}

.ball.red {
    background: radial-gradient(circle at 30% 30%, #ff4d4d, #b30000);
}

.ball.blue {
    background: radial-gradient(circle at 30% 30%, #4da6ff, #003366);
}

.ball.green {
    background: radial-gradient(circle at 30% 30%, #4dff88, #009933);
    display: none; /* 默认隐藏3D球 */
}

.period {
    text-align: center;
    font-size: 1.4em;
    color: #ffd700;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td {
    padding: 12px;
    text-align: center;
    border-bottom: 1px solid #222;
}

th {
    color: #888;
}

td.num {
    font-size: 1.4em;
}

/* 游戏切换按钮 */
.game-switch {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 10px;
}
.game-btn {
    padding: 8px 20px;
    border: 2px solid #ffd700;
    background: transparent;
    color: #ffd700;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s;
}

.game-btn.active {
    background: #ffd700;
    color: #000;
}

/* 移动端适配 */
@media screen and (max-width: 768px) {
    header h1 {
        font-size: 2.5em;
    }
    
    .lottery-box {
        gap: 40px;
    }
    
    .ball {
        width: 100px;
        height: 100px;
        font-size: 3.5em;
    }
    
    .datetime {
        font-size: 1.6em;
        color: #ffd700;
        margin-top: 15px;
        font-weight: bold;
        text-align: center;
    }
}

.new-period {
    color: #ff4444 !important;
    font-weight: bold;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.7; }
    100% { opacity: 1; }
}

.floating-live-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9999;
    background: linear-gradient(135deg, #ff3333, #cc0000);
    color: white;
    padding: 12px 18px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: bold;
    font-size: 1.1em;
    box-shadow: 0 4px 15px rgba(255, 0, 0, 0.4);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s;
    animation: float 3s ease-in-out infinite;
}

.floating-live-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(255, 0, 0, 0.6);
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}

.live-btn {
    display: none;
}

/* 推荐号码区域 */
.myanmar-time {
    color: #aaa;
    margin-top: 5px;
    font-size: 0.9em;
}

.recommend-box {
    margin: 20px 0;
    text-align: center;
}

.recommend-title {
    color: #ffd700;
    font-size: 1.2em;
    margin-bottom: 8px;
}

.recommend-nums {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
}

.recommend-num {
    color: #ffd700;
    font-size: 1.1em;
    padding: 3px 8px;
    border: 1px solid #333;
    border-radius: 3px;
}

/* 3D 专属样式 */
.schedule-info {
    background: rgba(255, 215, 0, 0.1);
    border: 1px solid #ffd700;
    border-radius: 8px;
    padding: 10px;
    margin: 15px 0;
    text-align: center;
    color: #ffd700;
    font-size: 0.9em;
    display: none;
}
</style>
</head>

<body>

<div class="container">
    <header>
        <h1>🧧 财神开奖 🧧</h1>
        <div class="game-switch">
            <button class="game-btn active" onclick="switchGame('2d')">2D开奖</button>
            <button class="game-btn" onclick="switchGame('3d')">3D开奖</button>
        </div>
        <div class="myanmar-time" id="myanmarTime"></div>
    </header>

    <!-- 2D 公告 -->
    <div class="notice" id="notice2d">
        📢 1赔80 缅甸时间每天晚上6:30封盘 7:00开奖
    </div>
    
    <!-- 3D 公告 -->
    <div class="schedule-info" id="notice3d">
        ⏰ 3D开奖：每周六 缅甸时间 22:00
    </div>

    <div class="period" id="period"></div>

    <!-- 2D 球 -->
    <div class="lottery-box" id="box2d">
        <div class="ball red" id="b1"></div>
        <div class="ball blue" id="b2"></div>
    </div>

    <!-- 3D 球 -->
    <div class="lottery-box" id="box3d" style="display:none;">
        <div class="ball red" id="b3d1"></div>
        <div class="ball blue" id="b3d2"></div>
        <div class="ball green" id="b3d3"></div>
    </div>

    <div class="datetime" id="datetime"></div>

    <!-- 推荐号码（仅2D显示） -->
    <div class="recommend-box" id="recommendBox">
        <div class="recommend-title">今日推荐号码</div>
        <div class="recommend-nums" id="recommendNums"></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>期号</th>
                <th>时间</th>
                <th>结果</th>
            </tr>
        </thead>
        <tbody id="history"></tbody>
    </table>
</div>

<!-- 悬浮直播按钮（仅2D显示） -->
<a href="https://m.twitch.tv/caishenzihua?desktop-redirect=true" target="_blank" class="floating-live-btn" id="liveBtn">
    🔴 直播中
</a>

<script>
// 缅甸实时时间
function updateMyanmarTime() {
    const now = new Date();
    const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    const myanmarTime = new Date(utc + (3600000 * 6.5));
    const timeStr = myanmarTime.toLocaleString('zh-CN', {
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
    });
    document.getElementById('myanmarTime').textContent = `缅甸时间：${timeStr}`;
}
updateMyanmarTime();
setInterval(updateMyanmarTime, 1000);

// 生成10组不重复推荐号码（仅2D使用）
function generateUniqueRecommend() {
    const today = new Date().toISOString().split('T')[0].replace(/-/g, '');
    let seed = parseInt(today, 10);
    const nums = new Set();
    
    while (nums.size < 10) {
        seed = (seed * 9301 + 49297) % 233280;
        const num = String(seed % 100).padStart(2, '0');
        nums.add(num);
    }
    return Array.from(nums);
}

// 显示推荐号码（仅2D）
const recommendNums = generateUniqueRecommend();
document.getElementById('recommendNums').innerHTML = recommendNums
    .map(num => `<span class="recommend-num">${num}</span>`)
    .join('');

// 数据接口
const URL_2D = "https://qingting.vercel.app/data/result.json";
const URL_3D = "https://qingting.vercel.app/data/result3d.json";

let currentGame = '2d';

function switchGame(game) {
    currentGame = game;
    
    // 更新按钮状态
    document.querySelectorAll('.game-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.textContent.includes(game.toUpperCase())) {
            btn.classList.add('active');
        }
    });
    
    // 切换显示
    const box2d = document.getElementById('box2d');
    const box3d = document.getElementById('box3d');
    const notice2d = document.getElementById('notice2d');
    const notice3d = document.getElementById('notice3d');
    const recommendBox = document.getElementById('recommendBox');
    const liveBtn = document.getElementById('liveBtn');
    
    if (game === '3d') {
        box2d.style.display = 'none';
        box3d.style.display = 'flex';
        notice2d.style.display = 'none';
        notice3d.style.display = 'block';
        recommendBox.style.display = 'none';
        liveBtn.style.display = 'none';
    } else {
        box2d.style.display = 'flex';
        box3d.style.display = 'none';
        notice2d.style.display = 'block';
        notice3d.style.display = 'none';
        recommendBox.style.display = 'block';
        liveBtn.style.display = 'flex';
    }
    
    // 清空旧数据
    document.getElementById('history').innerHTML = '';
    fetchData();
}

function fetchData() {
    const url = currentGame === '3d' ? URL_3D : URL_2D;
    
    fetch(url + "?t=" + Date.now())
    .then(res => res.json())
    .then(data => {
        // 期号显示（直接从JSON读取，不做任何计算）
        document.getElementById("period").innerText = `第${data.period}期`;
        
        // 号码
        if (currentGame === '2d') {
            document.getElementById("b1").innerText = data.num1;
            document.getElementById("b2").innerText = data.num2;
        } else {
            document.getElementById("b3d1").innerText = data.num1;
            document.getElementById("b3d2").innerText = data.num2;
            document.getElementById("b3d3").innerText = data.num3;
        }
        
        // 时间显示（3D固定显示规则）
        if (currentGame === '3d') {
            // 3D显示：每周六 缅甸时间 22:00 + 具体日期
            document.getElementById("datetime").innerText = `每周六 缅甸时间 22:00 (${data.time})`;
        } else {
            // 2D显示：开奖时间 + 具体时间
            document.getElementById("datetime").innerText = `开奖时间：${data.time}`;
        }
        
        // 动画效果
        const balls = currentGame === '2d' ? 
            [document.getElementById("b1"), document.getElementById("b2")] : 
            [document.getElementById("b3d1"), document.getElementById("b3d2"), document.getElementById("b3d3")];
        
        balls.forEach(b => b.classList.remove("show"));
        setTimeout(() => balls.forEach(b => b.classList.add("show")), 100);

        // 历史记录
        const tbody = document.getElementById("history");
        tbody.innerHTML = '';
        
        if (data.history && data.history.length > 0) {
            data.history.forEach((r, index) => {
                const isNew = index === 0;
                let resultHtml = '';
                
                if (currentGame === '2d') {
                    resultHtml = `${r.num1} ${r.num2}`;
                } else {
                    resultHtml = `${r.num1} ${r.num2} ${r.num3}`;
                }
                
                tbody.innerHTML += `
                    <tr ${isNew ? 'class="new-period"' : ''}>
                        <td ${isNew ? 'style="color:#ff4444;font-weight:bold;"' : ''}>第${r.period}期</td>
                        <td ${isNew ? 'style="color:#ff4444;font-weight:bold;"' : ''}>${r.time}</td>
                        <td class="num" ${isNew ? 'style="color:#ff4444;font-weight:bold;"' : ''}>${resultHtml}</td>
                    </tr>
                `;
            });
        }
    });
}

fetchData();
setInterval(fetchData, 3000);
</script>

</body>
</html>
