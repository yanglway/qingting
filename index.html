<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>财神2D</title>
<meta http-equiv="refresh" content="5">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: "Microsoft YaHei", sans-serif;
    background: radial-gradient(circle at top, #2a2a2a, #0d0d0d);
    color: #fff;
    min-height: 100vh;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 30px 20px;
}

header {
    text-align: center;
}

header h1 {
    font-size: 3.5em;
    color: #ffd700;
}

.datetime {
    color: #aaa;
    margin-top: 10px;
}

.notice {
    background: rgba(255,215,0,.08);
    border-left: 4px solid #ffd700;
    padding: 15px;
    margin: 20px 0;
}

.lottery-box {
    display: flex;
    justify-content: center;
    gap: 80px;
    margin: 30px 0;
}

.ball {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    font-size: 5em;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: scale(0);
    transition: transform .6s ease;
}

.ball.show {
    transform: scale(1);
}

.ball.red {
    background: radial-gradient(circle at 30% 30%, #ff4d4d, #b30000);
}

.ball.blue {
    background: radial-gradient(circle at 30% 30%, #4da6ff, #003366);
}

.period {
    text-align: center;
    font-size: 1.4em;
    color: #ffd700;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td {
    padding: 12px;
    text-align: center;
    border-bottom: 1px solid #222;
}

th {
    color: #888;
}

td.num {
    font-size: 1.4em;
}
</style>
</head>

<body>

<div class="container">
    <header>
        <h1>🧧 财神2D 🧧</h1>
        <div class="datetime" id="datetime"></div>
    </header>

    <div class="notice">
        📢 本页面数据来自 GitHub 公共配置，适合多设备同步展示。
    </div>

    <div class="period" id="period"></div>

    <div class="lottery-box">
        <div class="ball red" id="b1"></div>
        <div class="ball blue" id="b2"></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>期号</th>
                <th>时间</th>
                <th>结果</th>
            </tr>
        </thead>
        <tbody id="history"></tbody>
    </table>
</div>

<script>
const jsonUrl =
  "https://raw.githubusercontent.com/你的用户名/你的仓库名/main/results.json";

fetch(jsonUrl)
.then(res => res.json())
.then(data => {
    document.getElementById("period").innerText = `第${data.period}期`;
    document.getElementById("b1").innerText = data.num1;
    document.getElementById("b2").innerText = data.num2;
    document.getElementById("datetime").innerText = data.time;

    setTimeout(() => {
        document.getElementById("b1").classList.add("show");
        document.getElementById("b2").classList.add("show");
    }, 100);

    const tbody = document.getElementById("history");
    data.history.forEach(r => {
        tbody.innerHTML += `
            <tr>
                <td>第${r.period}期</td>
                <td>${r.time}</td>
                <td class="num">${r.num1} ${r.num2}</td>
            </tr>
        `;
    });
});
</script>

</body>
</html>
